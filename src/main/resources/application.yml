spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/yun_picture?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB # 单个文件大小限制
      max-request-size: 100MB # 整个请求大小限制
  # mandatory-file-encoding: UTF-8
  profiles:
    active: local
server:
  port: 8081
  servlet:
    context-path: /api
    # encoding:
    #   charset: UTF-8
    #   force: true
    #   enabled: true

logging:
  level:
    root: info
    org.hibernate.SQL: debug
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true #自动从传统下划线命名转换驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan:
        - com.wuzhenhua.yunpicturebackend.controller
